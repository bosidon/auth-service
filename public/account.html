<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>账号设置 - 仙宝心灵成长</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans SC','PingFang SC','Hiragino Sans GB',sans-serif;font-size:1rem;background:#0d0d12;color:#e0e0e0;min-height:100vh}
.container{max-width:560px;margin:0 auto;padding:24px 20px 60px}
.back{display:inline-flex;align-items:center;gap:6px;color:#94a3b8;font-size:0.88rem;text-decoration:none;margin-bottom:20px}
.back:hover{color:#e0e0e0}
.card{background:#14141e;border:1px solid #1e1e2a;border-radius:14px;padding:24px;margin-bottom:16px}
.card-title{font-size:0.88rem;font-weight:600;color:#94a3b8;margin-bottom:16px;display:flex;align-items:center;gap:6px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:0.88rem}
.info-row:last-child{border:none}
.info-label{color:#94a3b8}
.info-value{color:#e0e0e0}
.avatar-row{display:flex;align-items:center;gap:16px}
.avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:#fff;font-weight:700;overflow:hidden;flex-shrink:0}
.avatar img{width:100%;height:100%;object-fit:cover}
.avatar-input{flex:1}
.avatar-input input{width:100%;padding:8px 12px;border:1px solid #1e1e2a;border-radius:8px;background:#0d0d12;color:#e0e0e0;font-size:0.88rem;outline:none}
.avatar-input input:focus{border-color:#7c3aed}
label{display:block;font-size:0.88rem;color:#94a3b8;margin-bottom:4px}
.input{width:100%;padding:10px 14px;border:1px solid #1e1e2a;border-radius:8px;background:#0d0d12;color:#e0e0e0;font-size:0.88rem;outline:none;margin-bottom:12px;box-sizing:border-box}
.input:focus{border-color:#7c3aed}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 20px;border-radius:8px;border:none;font-size:0.88rem;font-weight:600;cursor:pointer;transition:.2s;text-decoration:none}
.btn-primary{background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-outline{background:transparent;border:1px solid #1e1e2a;color:#94a3b8}
.btn-outline:hover{border-color:#7c3aed;color:#e0e0e0}
.btn-sm{padding:6px 14px;font-size:0.75rem}
.btn-full{width:100%;justify-content:center}
.binding-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.binding-item:last-child{border:none}
.binding-left{display:flex;align-items:center;gap:10px}
.binding-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.88rem}
.binding-icon.qq{background:rgba(18,183,245,.15);color:#12b7f5}
.binding-icon.wechat{background:rgba(7,193,96,.15);color:#07c160}
.binding-icon.phone{background:rgba(59,130,246,.15);color:#3b82f6}
.binding-name{font-size:0.88rem}
.binding-status{font-size:0.75rem;color:#6b7280}
.vip-row{display:flex;align-items:center;justify-content:space-between}
.vip-plan{font-size:1rem;font-weight:600}
.vip-plan.free{color:#6b7280}
.vip-plan.vip{color:#f59e0b}
.vip-expires{font-size:0.75rem;color:#6b7280;margin-top:2px}
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:8px;font-size:0.88rem;z-index:9999;display:none;animation:fadeDown .3s ease}
.toast.ok{background:#065f46;color:#6ee7b7}
.toast.err{background:#7f1d1d;color:#fca5a5}
@keyframes fadeDown{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>
<div class="container">
  <a href="https://xianbao.online" class="back">← 返回仙宝</a>

  <!-- 用户信息 -->
  <div class="card">
    <div class="card-title">👤 账户信息</div>
    <div class="avatar-row" style="margin-bottom:16px">
      <div class="avatar" id="avatarDisplay">?</div>
      <div class="avatar-input">
        <label>头像链接</label>
        <input type="text" id="avatarUrl" class="input" placeholder="输入头像图片URL" style="margin-bottom:0">
      </div>
    </div>
    <div class="info-row"><span class="info-label">邮箱</span><span class="info-value" id="infoEmail">-</span></div>
    <div class="info-row"><span class="info-label">昵称</span><span class="info-value" id="infoNick">-</span></div>
    <div class="info-row"><span class="info-label">用户名</span><span class="info-value" id="infoUser">-</span></div>
    <div class="info-row"><span class="info-label">注册时间</span><span class="info-value" id="infoCreated">-</span></div>
    <div style="margin-top:12px">
      <label>修改昵称</label>
      <div style="display:flex;gap:8px">
        <input type="text" id="nickname" class="input" placeholder="新昵称" style="flex:1;margin-bottom:0">
        <button class="btn btn-primary btn-sm" onclick="saveProfile()">保存</button>
      </div>
    </div>
  </div>

  <!-- 密码 -->
  <div class="card">
    <div class="card-title">🔒 登录密码</div>
    <label>当前密码</label>
    <input type="password" id="oldPwd" class="input" placeholder="输入当前密码">
    <label>新密码</label>
    <input type="password" id="newPwd" class="input" placeholder="至少6位">
    <label>确认密码</label>
    <input type="password" id="confirmPwd" class="input" placeholder="再输一次">
    <button class="btn btn-primary btn-full" onclick="changePwd()">修改密码</button>
    <div style="text-align:center;margin-top:12px">
      <a href="https://auth.xianbao.online/reset-password" style="color:#64748b;font-size:0.75rem;text-decoration:none">忘记密码或未设置密码？点此通过邮箱重置</a>
    </div>
  </div>

  <!-- 绑定 -->
  <div class="card">
    <div class="card-title">🔗 账号绑定</div>
    <div class="binding-item">
      <div class="binding-left"><div class="binding-icon qq">Q</div><div><div class="binding-name">QQ</div><div class="binding-status" id="qqStatus">未绑定</div></div></div>
      <button class="btn btn-outline btn-sm" onclick="bindQQ()">绑定</button>
    </div>
    <div class="binding-item">
      <div class="binding-left"><div class="binding-icon wechat">W</div><div><div class="binding-name">微信</div><div class="binding-status" id="wechatStatus">未绑定</div></div></div>
      <button class="btn btn-outline btn-sm" onclick="bindWechat()">绑定</button>
    </div>
    <div class="binding-item">
      <div class="binding-left"><div class="binding-icon phone">📞</div><div><div class="binding-name">手机号</div><div class="binding-status" id="phoneStatus">未绑定</div></div></div>
      <button class="btn btn-outline btn-sm" onclick="bindPhone()">绑定</button>
    </div>
  </div>

  <!-- VIP -->
  <div class="card">
    <div class="card-title">⭐ VIP会员</div>
    <div class="vip-row">
      <div>
        <div class="vip-plan free" id="vipPlan">免费版</div>
        <div class="vip-expires" id="vipExpires"></div>
      </div>
      <a href="https://xianbao.online/vip.html" class="btn btn-primary btn-sm" style="text-decoration:none">升级VIP</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://xianbao.online/assets/xianbao/auth-widget.js"></script>
<script>
var AUTH = 'https://auth.xianbao.online';

function showToast(msg, type){
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type; t.style.display = 'block';
  setTimeout(function(){t.style.display='none'}, 3000);
}

function api(path, data){
  return fetch(AUTH + '/api' + path, {
    method: 'POST', headers: {'Content-Type':'application/json'}, credentials: 'include',
    body: JSON.stringify(data)
  }).then(function(r){return r.json()});
}

function apiGet(path){
  return fetch(AUTH + '/api' + path, {credentials: 'include'}).then(function(r){return r.json()});
}

// 验证登录状态
XianbaoAuth.checkAuth().then(function(){
  if(XianbaoAuth.isLoggedIn()){
    initPage();
  } else {
    window.location.href='https://xianbao.online';
  }
});

function initPage(){
  apiGet('/auth/me').then(function(d){
    if(!d.success){ showToast('请重新登录','err'); return; }
    var u = d.data;
    document.getElementById('infoEmail').textContent = u.email || '-';
    document.getElementById('infoNick').textContent = u.nickname || '-';
    document.getElementById('infoUser').textContent = u.username || '-';
    document.getElementById('infoCreated').textContent = u.created_at ? u.created_at.slice(0,10) : '-';
    document.getElementById('nickname').value = u.nickname || '';
    document.getElementById('avatarUrl').value = u.avatar_url || '';
    updateAvatar(u.avatar_url, u.nickname || u.username || '?');
    if(u.plan && u.plan !== 'free'){
      document.getElementById('vipPlan').textContent = 'VIP会员';
      document.getElementById('vipPlan').className = 'vip-plan vip';
      if(u.expires_at) document.getElementById('vipExpires').textContent = '到期: ' + u.expires_at.slice(0,10);
    }
  });
}

function updateAvatar(url, name){
  var el = document.getElementById('avatarDisplay');
  if(url){ el.innerHTML = '<img src="'+url+'" alt="">'; }
  else { el.textContent = name.charAt(0).toUpperCase(); }
}

function saveProfile(){
  var nickname = document.getElementById('nickname').value;
  var avatarUrl = document.getElementById('avatarUrl').value;
  api('/users/profile', {nickname:nickname, avatar_url:avatarUrl}).then(function(d){
    if(d.success){
      showToast('保存成功','ok');
      document.getElementById('infoNick').textContent = nickname || '-';
      updateAvatar(avatarUrl, nickname || '?');
    } else {
      showToast(d.error || '保存失败','err');
    }
  });
}

function changePwd(){
  var oldPwd = document.getElementById('oldPwd').value;
  var newPwd = document.getElementById('newPwd').value;
  var confirmPwd = document.getElementById('confirmPwd').value;
  if(!oldPwd || !newPwd){ showToast('请填写完整','err'); return; }
  if(newPwd.length < 6){ showToast('密码至少6位','err'); return; }
  if(newPwd !== confirmPwd){ showToast('两次密码不一致','err'); return; }
  api('/auth/change-password', {oldPassword:oldPwd, newPassword:newPwd}).then(function(d){
    if(d.success){
      showToast('密码已修改','ok');
      document.getElementById('oldPwd').value=''; document.getElementById('newPwd').value=''; document.getElementById('confirmPwd').value='';
    } else {
      showToast(d.error || '修改失败','err');
    }
  });
}

function bindQQ(){ showToast('QQ登录功能开发中','err'); }
function bindWechat(){ showToast('微信登录功能开发中','err'); }
function bindPhone(){ showToast('手机号绑定功能开发中','err'); }
</script>
</body>
</html>
