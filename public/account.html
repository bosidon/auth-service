<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>账号设置 - 仙宝</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans SC','PingFang SC',sans-serif;font-size:1rem;background:#0d0d12;color:#e0e0e0;min-height:100vh}
.container{max-width:560px;margin:0 auto;padding:24px 20px 60px}
.back{display:inline-flex;align-items:center;gap:6px;color:#94a3b8;font-size:0.88rem;text-decoration:none;margin-bottom:20px}
.back:hover{color:#e0e0e0}
.card{background:#14141e;border:1px solid #1e1e2a;border-radius:14px;padding:24px;margin-bottom:16px}
.card-title{font-size:0.88rem;font-weight:600;color:#94a3b8;margin-bottom:16px;display:flex;align-items:center;gap:6px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:0.88rem;gap:8px}
.info-row:last-child{border-bottom:none}
.info-label{color:#94a3b8;white-space:nowrap;flex-shrink:0;width:50px}
.info-value{color:#e0e0e0;text-align:right;word-break:break-all;flex:1}
.info-row .edit-input{flex:1;padding:4px 8px;border:1px solid #1e1e2a;border-radius:6px;background:#0d0d12;color:#e0e0e0;font-size:0.82rem;outline:none;text-align:right}
.info-row .edit-input:focus{border-color:#7c3aed}
.info-row .edit-btn{padding:4px 10px;border:none;border-radius:5px;background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;font-size:0.75rem;font-weight:600;cursor:pointer;white-space:nowrap}
.info-row .edit-btn:hover{opacity:.85}
.info-row .save-hint{font-size:0.75rem;color:#34d399;margin-left:6px;display:none}
.avatar-wrap{display:flex;align-items:center;gap:16px}
.avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:1.6rem;color:#fff;font-weight:700;overflow:hidden;flex-shrink:0;cursor:pointer;position:relative}
.avatar img{width:100%;height:100%;object-fit:cover}
.avatar input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 20px;border-radius:8px;border:none;font-size:0.88rem;font-weight:600;cursor:pointer;transition:.2s;text-decoration:none;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-outline{background:transparent;border:1px solid #1e1e2a;color:#94a3b8}
.btn-outline:hover{border-color:#7c3aed;color:#e0e0e0}
.btn-sm{padding:6px 14px;font-size:0.75rem}
.btn-full{width:100%;justify-content:center}
.binding-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:0.88rem}
.binding-item:last-child{border:none}
.binding-left{display:flex;align-items:center;gap:10px}
.binding-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.88rem}
.binding-icon.qq{background:rgba(18,183,245,.15);color:#12b7f5}
.binding-icon.wechat{background:rgba(7,193,96,.15);color:#07c160}
.binding-icon.phone{background:rgba(59,130,246,.15);color:#3b82f6}
.binding-name{font-size:0.88rem}
.binding-status{font-size:0.75rem;color:#6b7280}
.vip-row{display:flex;align-items:center;justify-content:space-between}
.vip-plan{font-size:1rem;font-weight:600}
.vip-plan.free{color:#6b7280}
.vip-plan.vip{color:#f59e0b}
.vip-expires{font-size:0.75rem;color:#6b7280;margin-top:2px}
.desc{font-size:0.75rem;color:#6b7280;margin-top:4px}
.sec{margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,.06)}
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:8px;font-size:0.88rem;z-index:9999;display:none;animation:fadeDown .3s ease;text-align:center}
.toast.ok{background:#065f46;color:#6ee7b7}
.toast.err{background:#7f1d1d;color:#fca5a5}
@keyframes fadeDown{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>
<div class="container">
  <a href="https://xianbao.online" class="back">← 返回仙宝</a>

  <!-- 头像 -->
  <div class="card">
    <div class="card-title">🖼️ 头像</div>
    <div class="avatar-wrap">
      <div class="avatar" id="avatarDisplay">
        <input type="file" accept="image/*" id="avatarFile" onchange="uploadAvatar()">
      </div>
      <div style="font-size:0.82rem;color:#6b7280">点击头像选择图片上传</div>
    </div>
  
  </div>

  <!-- 账户信息（内联编辑） -->
  <div class="card">
    <div class="card-title">👤 账户信息</div>
    <div class="info-row">
      <span class="info-label">邮箱</span>
      <span class="info-value" id="infoEmail">-</span>
    </div>

    <div class="info-row">
      <span class="info-label">昵称</span>
      <input class="edit-input" id="editNickname" placeholder="设置昵称">
      <button class="edit-btn" onclick="saveField('nickname')">保存</button>
    </div>
    <div class="info-row">
      <span class="info-label">手机</span>
      <span class="info-value" id="infoPhone">未绑定</span>
    </div>
    <div class="info-row">
      <span class="info-label">注册</span>
      <span class="info-value" id="infoCreated">-</span>
    </div>
  </div>

  <!-- 绑定手机号 -->
  <div class="card">
    <div class="card-title">📱 绑定手机号</div>
    <div class="row" style="display:flex;gap:8px;margin-bottom:8px">
      <input type="text" id="bindPhone" class="input" placeholder="手机号" style="flex:1;padding:8px 12px;border:1px solid #1e1e2a;border-radius:8px;background:#0d0d12;color:#e0e0e0;font-size:0.88rem;outline:none">
      <button class="btn btn-outline btn-sm" id="sendPhoneBtn" onclick="sendPhoneCode()">获取验证码</button>
    </div>
    <div class="row" style="display:flex;gap:8px">
      <input type="text" id="phoneCode" placeholder="验证码" style="flex:1;padding:8px 12px;border:1px solid #1e1e2a;border-radius:8px;background:#0d0d12;color:#e0e0e0;font-size:0.88rem;outline:none">
      <button class="btn btn-primary btn-sm" onclick="bindPhone()">绑定</button>
    </div>
  </div>

  <!-- 密码 -->
  <div class="card">
    <div class="card-title">🔒 登录密码</div>
    <p style="font-size:0.82rem;color:#6b7280;margin-bottom:12px">重置链接将发送到你的注册邮箱</p>
    <button class="btn btn-outline btn-full" id="sendResetBtn" onclick="sendReset()">发送重置链接到邮箱</button>
  </div>

  <!-- 社交绑定 -->
  <div class="card">
    <div class="card-title">🔗 社交绑定</div>
    <div class="binding-item">
      <div class="binding-left"><div class="binding-icon qq">Q</div><div><div class="binding-name">QQ</div><div class="binding-status">未绑定</div></div></div>
      <button class="btn btn-outline btn-sm" onclick="showToast('QQ登录开发中','err')">绑定</button>
    </div>
    <div class="binding-item">
      <div class="binding-left"><div class="binding-icon wechat">W</div><div><div class="binding-name">微信</div><div class="binding-status">未绑定</div></div></div>
      <button class="btn btn-outline btn-sm" onclick="showToast('微信登录开发中','err')">绑定</button>
    </div>
  </div>

  <!-- VIP -->
  <div class="card">
    <div class="card-title">⭐ VIP会员</div>
    <div class="vip-row">
      <div>
        <div class="vip-plan free" id="vipPlan">免费版</div>
        <div class="vip-expires" id="vipExpires"></div>
      </div>
      <a href="https://xianbao.online/vip.html" class="btn btn-primary btn-sm" style="text-decoration:none">升级VIP</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://xianbao.online/assets/xianbao/auth-widget.js"></script>
<script>
var AUTH='https://auth.xianbao.online';
function showToast(m,t){var e=document.getElementById('toast');e.textContent=m;e.className='toast '+(t||'ok');e.style.display='block';setTimeout(function(){e.style.display='none'},3000)}
function api(p,d,m){return fetch(AUTH+'/api'+p,{method:m||'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:d?JSON.stringify(d):void 0}).then(function(r){return r.json()})}
function apiGet(p){return fetch(AUTH+'/api'+p,{credentials:'include'}).then(function(r){return r.json()})}

XianbaoAuth.checkAuth().then(function(){
  if(!XianbaoAuth.isLoggedIn()){window.location.href='https://xianbao.online';return}
  loadData();
});

function loadData(){
  apiGet('/auth/me').then(function(d){
    if(!d.success)return;
    var u=d.data;
    document.getElementById('infoEmail').textContent=u.email||'-';
    document.getElementById('editNickname').value=u.nickname||'';
    document.getElementById('infoPhone').textContent=u.phone||'未绑定';
    document.getElementById('infoCreated').textContent=u.created_at?u.created_at.slice(0,10):'-';
updateAvatar(u.avatar_url,u.nickname||'?');
    if(u.plan&&u.plan!=='free'){
      document.getElementById('vipPlan').textContent='VIP会员';
      document.getElementById('vipPlan').className='vip-plan vip';
      if(u.expires_at)document.getElementById('vipExpires').textContent='到期: '+u.expires_at.slice(0,10);
    }
  });
}

function updateAvatar(url,name){
  var el=document.getElementById('avatarDisplay');
  var inp='<input type="file" accept="image/*" id="avatarFile" onchange="uploadAvatar()">';
  if(url)el.innerHTML='<img src="'+url+'" alt="">'+inp;
  else el.textContent=name.charAt(0).toUpperCase();
  // Ensure file input is always present
  if(!el.querySelector('#avatarFile')){
    var d=document.createElement('input');
    d.type='file';d.accept='image/*';d.id='avatarFile';
    d.onchange=function(){uploadAvatar()};
    d.style.cssText='position:absolute;inset:0;opacity:0;cursor:pointer';
    el.appendChild(d);
  }
}

function uploadAvatar(){
  var file=document.getElementById('avatarFile').files[0];
  if(!file)return;
  if(file.size>5*1024*1024){showToast('图片不能超过5MB','err');return}
  var fd=new FormData();fd.append('avatar',file);
  fetch(AUTH+'/api/auth/upload-avatar',{method:'POST',credentials:'include',body:fd}).then(function(r){return r.json()}).then(function(d){
    if(d.success){
      var url=d.data.url;
      updateAvatar(AUTH+url,document.getElementById('editNickname').value||'?');
      
      showToast('头像已上传');
    } else showToast(d.error||'上传失败','err');
  });
}

function saveField(field){
  var input=document.getElementById('edit'+field.charAt(0).toUpperCase()+field.slice(1));
  var val=input.value;
  if(!val){showToast('请输入'+field,'err');return}
  var body={};body[field]=val;
  api('/users/profile',body,'PATCH').then(function(d){
    if(d.success)showToast('已更新');
    else showToast(d.error||'保存失败','err');
  });
}

function sendPhoneCode(){
  var phone=document.getElementById('bindPhone').value;
  if(!phone||phone.length<11){showToast('请输入正确手机号','err');return}
  var btn=document.getElementById('sendPhoneBtn');btn.disabled=true;
  api('/auth/send-phone-code',{phone:phone}).then(function(d){
    showToast(d.success?'验证码已发送（演示模式）':(d.error||'发送失败'),d.success?'ok':'err');
    if(!d.success)btn.disabled=false;
  });
}

function bindPhone(){
  var phone=document.getElementById('bindPhone').value;
  var code=document.getElementById('phoneCode').value;
  if(!phone||!code){showToast('请填写完整','err');return}
  api('/auth/bind-phone',{phone:phone}).then(function(d){
    if(d.success){document.getElementById('infoPhone').textContent=phone;showToast('手机号已绑定')}
    else showToast(d.error||'绑定失败','err');
  });
}

function sendReset(){
  var btn=document.getElementById('sendResetBtn');btn.disabled=true;btn.textContent='发送中...';
  api('/password/send-reset',{}).then(function(d){
    if(d.success){showToast('验证邮件已发送，请查看邮箱（包括垃圾箱）')}
    else{showToast(d.error||'发送失败','err');btn.disabled=false;btn.textContent='发送重置链接到邮箱'}
  });
}
</script>
</body>
</html>
