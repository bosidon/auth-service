<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重置密码 - 仙宝账号</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans SC','PingFang SC',sans-serif;font-size:1rem;background:linear-gradient(135deg,#0f172a,#1e293b);min-height:100vh;display:flex;align-items:center;justify-content:center;color:#e2e8f0;padding:20px}
.card{background:rgba(30,41,59,.9);border:1px solid rgba(148,163,184,.2);border-radius:16px;padding:40px;width:100%;max-width:400px;backdrop-filter:blur(10px)}
h1{font-size:1.4rem;text-align:center;margin-bottom:8px;font-weight:700}
.sub{text-align:center;color:#94a3b8;font-size:0.88rem;margin-bottom:24px}
label{display:block;font-size:0.82rem;color:#94a3b8;margin-bottom:6px}
input{width:100%;padding:10px 14px;border:1px solid rgba(148,163,184,.3);border-radius:8px;background:rgba(15,23,42,.6);color:#e2e8f0;font-size:0.88rem;outline:none;margin-bottom:12px;box-sizing:border-box}
input:focus{border-color:#7c3aed}
.btn{width:100%;padding:10px;border:none;border-radius:8px;background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;font-size:0.88rem;font-weight:600;cursor:pointer;margin-bottom:4px}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.5;cursor:not-allowed}
.msg{text-align:center;margin-top:16px;font-size:0.88rem}
.msg.ok{color:#34d399}
.msg.err{color:#f87171}
.hidden{display:none}
.link{text-align:center;margin-top:12px;font-size:0.82rem}
.link a{color:#7c3aed;text-decoration:none}
</style>
</head>
<body>
<div class="card" id="requestCard">
  <h1>🔑 重置密码</h1>
  <p class="sub" id="desc">输入注册邮箱，我们将发送重置链接</p>
  <div id="requestForm">
    <label>邮箱</label>
    <input type="email" id="email" placeholder="你的注册邮箱">
    <button class="btn" id="sendBtn" onclick="sendReset()">发送重置链接</button>
    <div id="reqMsg" class="msg hidden"></div>
  </div>
  <div id="requestSent" class="hidden" style="text-align:center;padding:20px 0">
    <div style="font-size:2rem;margin-bottom:12px">✅</div>
    <p style="font-size:1rem;font-weight:600;margin-bottom:8px">邮件已发送</p>
    <p style="font-size:0.82rem;color:#94a3b8">请查看你的邮箱（包括垃圾箱）<br>点击邮件中的链接重置密码</p>
  </div>
  <div class="link"><a href="https://xianbao.online">返回首页</a></div>
</div>

<div class="card hidden" id="resetCard">
  <h1>🔑 重置密码</h1>
  <p class="sub" id="desc2">设置你的新密码</p>
  <div id="resetForm" class="hidden">
    <label>新密码</label>
    <input type="password" id="pwd1" placeholder="至少6位">
    <label>确认密码</label>
    <input type="password" id="pwd2" placeholder="再输一次">
    <button class="btn" onclick="doReset()">确认重置</button>
    <div id="resetMsg" class="msg hidden"></div>
  </div>
  <div id="resetSuccess" class="hidden" style="text-align:center;padding:20px 0">
    <div style="font-size:2rem;margin-bottom:12px">✅</div>
    <p style="font-size:1rem;font-weight:600;margin-bottom:8px">密码已重置</p>
    <p style="font-size:0.82rem;color:#94a3b8">请用新密码登录</p>
  </div>
  <div id="resetInvalid" class="hidden" style="text-align:center;padding:20px 0">
    <div style="font-size:2rem;margin-bottom:12px">❌</div>
    <p style="font-size:1rem;font-weight:600;margin-bottom:8px" id="resetError">链接无效或已过期</p>
    <div class="link"><a href="https://auth.xianbao.online/reset-password">重新申请</a></div>
  </div>
</div>

<script>
var AUTH = 'https://auth.xianbao.online';

function show(id){document.getElementById(id).classList.remove('hidden')}
function hide(id){document.getElementById(id).classList.add('hidden')}
function msg(id,txt,type){
  var el=document.getElementById(id);
  el.textContent=txt;
  el.className='msg '+(type||'');
}

function sendReset(){
  var email=document.getElementById('email').value;
  if(!email){msg('reqMsg','请输入邮箱','err');return}
  var btn=document.getElementById('sendBtn');
  btn.disabled=true;btn.textContent='发送中...';
  fetch(AUTH+'/api/password/request',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:email})
  }).then(function(r){return r.json()}).then(function(d){
    if(d.success){
      hide('requestForm');
      show('requestSent');
      document.getElementById('desc').textContent='邮件已发送';
    } else {
      msg('reqMsg',d.error||'发送失败','err');
      btn.disabled=false;btn.textContent='发送重置链接';
    }
  });
}

// Check for token
var params = new URLSearchParams(window.location.search);
var token = params.get('token');

if(token){
  hide('requestCard');
  show('resetCard');
  document.getElementById('desc2').textContent='验证中...';
  
  fetch(AUTH+'/api/password/verify',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({token:token})
  }).then(function(r){return r.json()}).then(function(res){
    if(res.valid){
      document.getElementById('desc2').textContent='设置你的新密码';
      show('resetForm');
    } else {
      document.getElementById('desc2').textContent='';
      document.getElementById('resetError').textContent=res.error||'链接无效或已过期';
      show('resetInvalid');
    }
  });
}

function doReset(){
  var pwd1=document.getElementById('pwd1').value;
  var pwd2=document.getElementById('pwd2').value;
  if(!pwd1||pwd1.length<6){msg('resetMsg','密码至少6位','err');return}
  if(pwd1!==pwd2){msg('resetMsg','两次密码不一致','err');return}
  var btn=document.querySelector('#resetForm .btn');btn.disabled=true;btn.textContent='重置中...';
  fetch(AUTH+'/api/password/reset',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({token:token,password:pwd1})
  }).then(function(r){return r.json()}).then(function(d){
    if(d.success){
      hide('resetForm');
      show('resetSuccess');
      setTimeout(function(){window.location.href='https://xianbao.online'},2000);
    } else {
      msg('resetMsg',d.error||'重置失败','err');
      btn.disabled=false;btn.textContent='确认重置';
    }
  });
}
</script>
</body>
</html>
