<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>重置密码 - 仙宝账号</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0f172a, #1e293b); min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #e2e8f0; }
    .card { background: rgba(30,41,59,0.9); border: 1px solid rgba(148,163,184,0.2); border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; backdrop-filter: blur(10px); }
    h1 { font-size: 24px; text-align: center; margin-bottom: 8px; }
    .sub { text-align: center; color: #94a3b8; font-size: 14px; margin-bottom: 24px; }
    label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
    input { width: 100%; padding: 12px; border: 1px solid rgba(148,163,184,0.3); border-radius: 8px; background: rgba(15,23,42,0.6); color: #e2e8f0; font-size: 15px; outline: none; margin-bottom: 16px; }
    input:focus { border-color: #38bdf8; }
    button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: linear-gradient(135deg, #38bdf8, #818cf8); color: white; font-size: 15px; font-weight: 600; cursor: pointer; }
    button:hover { opacity: 0.9; }
    .msg { text-align: center; margin-top: 16px; font-size: 14px; }
    .msg.ok { color: #34d399; }
    .msg.err { color: #f87171; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔑 重置密码</h1>
    <p class="sub" id="desc">设置你的新密码</p>

    <form id="form" class="hidden">
      <label>新密码</label>
      <input type="password" id="pwd1" placeholder="至少6位" required>
      <label>确认密码</label>
      <input type="password" id="pwd2" placeholder="再输一次" required>
      <button type="submit">确认重置</button>
    </form>

    <p class="msg hidden" id="success">✅ 密码已重置！正在登录...</p>
    <p class="msg err hidden" id="error"></p>
  </div>

  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var token = params.get('token');
      var form = document.getElementById('form');
      var success = document.getElementById('success');
      var error = document.getElementById('error');
      var desc = document.getElementById('desc');

      if (!token) {
        desc.textContent = '无效的重置链接';
        return;
      }

      fetch('https://auth.xianbao.online/api/password/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: token })
      }).then(function(r) { return r.json(); }).then(function(res) {
        if (res.valid) {
          form.classList.remove('hidden');
        } else {
          desc.textContent = '链接已过期或无效';
        }
      }).catch(function() {
        desc.textContent = '网络错误，请重试';
      });

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        var p1 = document.getElementById('pwd1').value;
        var p2 = document.getElementById('pwd2').value;
        if (p1.length < 6) { showError('密码至少6位'); return; }
        if (p1 !== p2) { showError('两次密码不一致'); return; }

        fetch('https://auth.xianbao.online/api/password/reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: token, password: p1 })
        }).then(function(r) { return r.json(); }).then(function(res) {
          if (res.success) {
            form.classList.add('hidden');
            success.classList.remove('hidden');
            document.cookie = 'xianbao_token=' + res.token + '; path=/; max-age=604800; SameSite=None; Secure';
            setTimeout(function() { window.location.href = 'https://xianbao.online'; }, 1000);
          } else {
            showError(res.error || '重置失败');
          }
        }).catch(function() {
          showError('网络错误');
        });
      });

      function showError(msg) {
        error.textContent = msg;
        error.classList.remove('hidden');
        setTimeout(function() { error.classList.add('hidden'); }, 3000);
      }
    })();
  </script>
</body>
</html>
