<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仙宝管理后台</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #0d0d12;
  color: #e0e0e0;
  min-height: 100vh;
  padding-top: 60px;
}
.topbar-spacer { height: 60px; }
.container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
.page-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 24px 0 20px; border-bottom: 1px solid #1e1e2a; margin-bottom: 24px;
}
.page-header h1 {
  font-size: 22px; font-weight: 700;
  background: linear-gradient(135deg, #a78bfa, #7c3aed);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.page-header .user-info { font-size: 13px; color: #888; }
.page-header .user-info strong { color: #ccc; }
.stats-bar { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: nowrap; }
.stat-card {  background: #14141e; border: 1px solid #1e1e2a; border-radius: 10px;  padding: 16px 20px; flex: 1; min-width: 120px;  border-left: 3px solid #a78bfa;}.stat-card.vip { border-left-color: #f59e0b; }.stat-card.admin { border-left-color: #60a5fa; }.stat-card.regular { border-left-color: #34d399; }.stat-card .num-wrap {  display: flex; align-items: baseline; gap: 2px;}.stat-card .num { font-size: 28px; font-weight: 700; color: #a78bfa; }.stat-card.vip .num { color: #f59e0b; }.stat-card.admin .num { color: #60a5fa; }.stat-card.regular .num { color: #34d399; }.stat-card .label { font-size: 13px; color: #888; margin-top: 4px; }
.table-wrap {
  background: #14141e; border: 1px solid #1e1e2a; border-radius: 12px;
  overflow-x: auto;
}
table { width: 100%; border-collapse: collapse; }
thead { background: #1a1a26; }
th {
  padding: 10px 12px; text-align: left; font-size: 12px;
  font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px;
  white-space: nowrap;
}
td { padding: 8px 12px; font-size: 13px; border-top: 1px solid #1e1e2a; vertical-align: top; }
tr:hover td { background: #1a1a26; }
.role-badge {
  display: inline-block; padding: 3px 10px; border-radius: 20px;
  font-size: 12px; font-weight: 600;
}
.role-badge.admin { background: #7c3aed22; color: #a78bfa; border: 1px solid #7c3aed44; }
.role-badge.user { background: #1e1e2a; color: #888; border: 1px solid #2a2a3a; }
.plan-badge {
  display: inline-block; padding: 3px 10px; border-radius: 20px;
  font-size: 12px; font-weight: 600;
}
.plan-badge.vip { background: #f59e0b22; color: #fbbf24; border: 1px solid #f59e0b44; }
.plan-badge.free { background: #1e1e2a; color: #888; border: 1px solid #2a2a3a; }
.role-select, .plan-select {
  background: #1a1a26; color: #e0e0e0; border: 1px solid #2a2a3a;
  border-radius: 6px; padding: 5px 10px; font-size: 13px; cursor: pointer;
  outline: none;
}
.role-select:focus, .plan-select:focus { border-color: #7c3aed; }
.toolbar {
  display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: nowrap;
}
.search-box {
  background: #1a1a26; border: 1px solid #2a2a3a; border-radius: 8px;
  padding: 8px 14px; color: #e0e0e0; font-size: 14px; width: 260px;
  outline: none; transition: border-color 0.2s;
}
.search-box::placeholder { color: #555; }
.search-box:focus { border-color: #7c3aed; }
.btn {
  background: #7c3aed; color: #fff; border: none; border-radius: 8px;
  padding: 8px 18px; font-size: 14px; cursor: pointer; transition: background 0.2s;
}
.btn:hover { background: #6d28d9; }
.btn-outline {
  background: transparent; color: #a78bfa; border: 1px solid #7c3aed44;
  padding: 8px 18px; font-size: 14px; border-radius: 8px; cursor: pointer;
  transition: all 0.2s;
}
.btn-outline:hover { background: #7c3aed15; border-color: #7c3aed; }
.pagination {
  display: flex; justify-content: center; align-items: center; gap: 8px;
  padding: 16px; border-top: 1px solid #1e1e2a;
}
.pagination button {
  background: #1a1a26; color: #aaa; border: 1px solid #2a2a3a;
  border-radius: 6px; padding: 6px 14px; font-size: 13px; cursor: pointer;
  transition: all 0.2s;
}
.pagination button:hover:not(:disabled) { background: #2a2a3a; color: #e0e0e0; }
.pagination button:disabled { opacity: 0.3; cursor: not-allowed; }
.pagination .page-info { font-size: 13px; color: #666; margin: 0 8px; }
.toast {
  position: fixed; top: 80px; right: 20px; z-index: 9999;
  padding: 12px 20px; border-radius: 8px; font-size: 14px;
  transform: translateX(120%); transition: transform 0.3s ease;
  max-width: 360px;
}
.toast.show { transform: translateX(0); }
.toast.success { background: #065f4622; border: 1px solid #059669; color: #6ee7b7; }
.toast.error { background: #7f1d1d22; border: 1px solid #dc2626; color: #fca5a5; }
.loading {
  text-align: center; padding: 60px 20px; color: #666;
}
.loading .spinner {
  display: inline-block; width: 32px; height: 32px;
  border: 3px solid #1e1e2a; border-top-color: #a78bfa;
  border-radius: 50%; animation: spin 0.8s linear infinite;
  margin-bottom: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.usage-cell { font-size: 12px; color: #888; white-space: nowrap; }
.usage-cell .used { color: #a78bfa; }
.usage-cell .full { color: #f87171; }
.settings-panel {
  background: #14141e; border: 1px solid #1e1e2a; border-radius: 10px;
  padding: 16px 20px; margin-bottom: 16px;
}
.settings-panel .title {
  font-size: 14px; font-weight: 600; color: #a78bfa; margin-bottom: 8px;
}
.settings-panel .row {
  display: flex; gap: 16px; align-items: flex-end; flex-wrap: nowrap;
}
.settings-field {
  display: flex; flex-direction: column; gap: 4px;
}
.settings-field label {
  font-size: 12px; color: #666;
}
.settings-field input {
  background: #1a1a26; color: #e0e0e0; border: 1px solid #2a2a3a;
  border-radius: 6px; padding: 6px 10px; font-size: 14px; width: 80px;
  outline: none; text-align: center;
}
.settings-field input:focus { border-color: #7c3aed; }
.settings-panel .save-btn {
  background: #065f46; color: #6ee7b7; border: 1px solid #059669;
  border-radius: 6px; padding: 6px 18px; font-size: 13px; cursor: pointer;
  transition: all 0.2s;
}
.settings-panel .save-btn:hover { background: #047857; }

.stats-panel {
  background: #14141e; border: 1px solid #1e1e2a; border-radius: 10px;
  padding: 16px 20px; margin-bottom: 16px;
}
.stats-panel .title {
  font-size: 14px; font-weight: 600; color: #a78bfa; margin-bottom: 8px;
}
.stats-row {
  display: flex; gap: 16px; flex-wrap: nowrap;
}
.stat-item {
  display: flex; flex-direction: row; align-items: center;
  gap: 6px;
}
.stat-num {
  font-size: 15px; font-weight: 700; color: #fbbf24;
}
.stat-label {
  font-size: 12px; color: #888;
}

@media (max-width: 768px) {  .settings-field input { width: 80px; flex: none; }  .settings-panel .row { flex-wrap: wrap; gap: 10px; }  .stats-bar { flex-direction: row; flex-wrap: wrap; gap: 10px; }  .stats-bar .stat-card { min-width: calc(50% - 5px); flex: none; padding: 12px 14px; }  .stats-bar .stat-card .num { font-size: 22px; }  .stats-bar .stat-card .label { font-size: 12px; }  .toolbar { flex-direction: row; flex-wrap: nowrap; gap: 6px; }  .toolbar .search-box { width: auto; flex: 1; min-width: 0; }  .toolbar .btn, .toolbar .btn-outline { white-space: nowrap; flex-shrink: 0; }  .page-header { flex-direction: column; align-items: flex-start; gap: 8px; }}
</style>
</head>
<body>

<div id="xianbao-topbar"></div>
<script src="https://assets.xianbao.online/xianbao/xianbao-topbar.js"></script>

<div class="topbar-spacer"></div>

<div class="container">
  <div class="page-header" id="pageHeader">
    <h1>⚙️ 管理后台</h1>
    <div class="user-info" id="userInfo">加载中…</div>
  </div>

  <div class="stats-bar" id="statsBar">
    <div class="stat-card"><div class="num-wrap"><div class="num" id="totalUsers">-</div></div><div class="label">总用户</div></div>
    <div class="stat-card vip"><div class="num-wrap"><div class="num" id="vipCount">-</div></div><div class="label">VIP 用户</div></div>
    <div class="stat-card admin"><div class="num-wrap"><div class="num" id="adminCount">-</div></div><div class="label">管理员</div></div>
    <div class="stat-card regular"><div class="num-wrap"><div class="num" id="regularCount">-</div></div><div class="label">普通用户</div></div>
  </div>

  <div class="settings-panel" id="settingsPanel">
    <div class="title">⚙️ 免费次数设置</div>
    <div class="row">
      <div class="settings-field"><label>塔罗</label><input id="limitTarot" class="limit-input" type="number" min="0" max="999" /></div>
      <div class="settings-field"><label>玛雅</label><input id="limitMaya" class="limit-input" type="number" min="0" max="999" /></div>
      <div class="settings-field"><label>测评</label><input id="limitPsychTest" class="limit-input" type="number" min="0" max="999" /></div>
      <div class="settings-field"><label>阅读</label><input id="limitReading" class="limit-input" type="number" min="0" max="999" /></div>
      <button class="save-btn" id="saveLimitsBtn">保存设置</button>
    </div>
  </div>

  <div class="stats-panel" id="statsPanel">
    <div class="title">📊 用量统计</div>
    <div class="stats-row" id="statsRow">
      <div class="stat-item"><span class="stat-num" id="statTarot">-</span><span class="stat-label">塔罗</span></div>
      <div class="stat-item"><span class="stat-num" id="statMaya">-</span><span class="stat-label">玛雅</span></div>
      <div class="stat-item"><span class="stat-num" id="statPsychTest">-</span><span class="stat-label">测评</span></div>
      <div class="stat-item"><span class="stat-num" id="statReading">-</span><span class="stat-label">阅读</span></div>
      <div class="stat-item"><span class="stat-num" id="statActiveUsers">-</span><span class="stat-label">使用用户</span></div>
    </div>
  </div>

  <div class="toolbar">
    <input class="search-box" id="searchInput" placeholder="🔍 搜索用户名 / 邮箱…" />
    <button class="btn" id="searchBtn">搜索</button>
    <button class="btn-outline" id="clearSearchBtn" style="display:none">清除</button>
  </div>

  <div class="table-wrap">
    <div class="loading" id="loadingState">
      <div class="spinner"></div>
      <div>加载用户数据…</div>
    </div>
    <div id="tableContent" style="display:none">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>用户名</th>
            <th>邮箱</th>
            <th>角色</th>
            <th>套餐</th>
            <th>到期时间</th>
            <th>用量</th>
            <th>注册时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="userTableBody"></tbody>
      </table>
      <div class="pagination" id="pagination">
        <button id="prevPage" disabled>← 上一页</button>
        <span class="page-info" id="pageInfo">第 1 页</span>
        <button id="nextPage" disabled>下一页 →</button>
      </div>
    </div>
    <div id="errorState" style="display:none; text-align:center; padding:40px 20px; color:#fca5a5;">
      ❌ <span id="errorMsg">加载失败</span>
      <br><br>
      <button class="btn-outline" onclick="loadUsers()">重试</button>
    </div>
    <div id="emptyState" style="display:none; text-align:center; padding:40px 20px; color:#888;">
      📭 暂无用户数据
    </div>
    <div id="noAuthState" style="display:none; text-align:center; padding:60px 20px;">
      <div style="font-size:48px; margin-bottom:16px;">🔒</div>
      <h2 style="color:#a78bfa; margin-bottom:8px;">需要管理员权限</h2>
      <p style="color:#888; font-size:14px;">请使用管理员账号登录后访问此页面</p>
      <br>
      <a href="https://xianbao.online/login" class="btn" style="display:inline-block; text-decoration:none;">前往登录</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_BASE = '/api';
const PAGE_SIZE = 50;

let currentPage = 1;
let currentSearch = '';
let currentUser = null;
let allUsageMap = {};

// Service labels
const SERVICE_LABELS = {
  tarot: '塔罗',
  maya: '玛雅',
  psych_test: '测评',
  reading: '阅读'
};

const FREE_LIMITS = { tarot: 20, maya: 3, psych_test: 3, reading: 3 };

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function fmtDate(dateStr) {
  if (!dateStr) return '-';
  const d = new Date(dateStr);
  return d.toLocaleDateString('zh-CN', { year:'numeric', month:'2-digit', day:'2-digit' });
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function renderUsers(users) {
  const tbody = document.getElementById('userTableBody');
  if (!users || users.length === 0) {
    document.getElementById('tableContent').style.display = 'none';
    document.getElementById('emptyState').style.display = 'block';
    document.getElementById('errorState').style.display = 'none';
    document.getElementById('loadingState').style.display = 'none';
    return;
  }

  document.getElementById('tableContent').style.display = 'block';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('errorState').style.display = 'none';
  document.getElementById('loadingState').style.display = 'none';

  tbody.innerHTML = users.map(u => {
    const isSelf = currentUser && currentUser.id === u.id;
    const roleClass = u.role === 'admin' ? 'admin' : 'user';

    // Role dropdown
    let roleSelect = '<span class="role-badge ' + roleClass + '">' + (u.role === 'admin' ? '管理员' : '普通用户') + '</span>';
    if (!isSelf) {
      roleSelect = '<select class="role-select" data-user-id="' + u.id + '" data-original-role="' + u.role + '">' +
        '<option value="user" ' + (u.role === 'user' ? 'selected' : '') + '>普通用户</option>' +
        '<option value="admin" ' + (u.role === 'admin' ? 'selected' : '') + '>管理员</option>' +
      '</select>';
    }

    // Plan display
    let planLabel = '免费';
    let planClass = 'free';
    if (u.plan === 'vip') {
      if (u.expires_at) {
        const d = new Date(u.expires_at);
        const remaining = Math.ceil((d - new Date()) / (1000 * 60 * 60 * 24));
        planLabel = '年卡(' + remaining + '天)';
        planClass = 'vip';
      } else {
        planLabel = '终身会员';
        planClass = 'vip';
      }
    }
    let planSelect = '<span class="plan-badge ' + planClass + '">' + planLabel + '</span>';
    if (!isSelf) {
      const curPlan = u.expires_at ? 'yearly' : (u.plan === 'vip' ? 'lifetime' : 'free');
      planSelect = '<select class="plan-select" data-user-id="' + u.id + '" data-original-plan="' + curPlan + '">' +
        '<option value="free" ' + (curPlan === 'free' ? 'selected' : '') + '>免费</option>' +
        '<option value="yearly" ' + (curPlan === 'yearly' ? 'selected' : '') + '>年卡</option>' +
        '<option value="lifetime" ' + (curPlan === 'lifetime' ? 'selected' : '') + '>终身会员</option>' +
      '</select>';
    }

    // Usage display
    const usage = allUsageMap[u.id] || [];
    let usageHtml = '';
    if (usage.length > 0) {
      usageHtml = usage.map(function(s) {
        var label = SERVICE_LABELS[s.service] || s.service;
        return '<span>' + label + ': ' + s.used + '</span>';
      }).join(' &nbsp;|&nbsp; ');
    } else {
      usageHtml = '<span style="color:#555">-</span>';
    }

    return `<tr>
      <td style="color:#666">${u.id}</td>
      <td><strong>${escHtml(u.username)}</strong></td>
      <td style="color:#aaa">${escHtml(u.email)}</td>
      <td>${roleSelect}</td>
      <td>${planSelect}</td>
      <td style="color:#888;font-size:12px">${u.plan === 'vip' && u.expires_at ? fmtDate(u.expires_at) : '-'}</td>
      <td class="usage-cell">${usageHtml}</td>
      <td style="color:#666;font-size:13px">${fmtDate(u.created_at)}</td>
      <td>
        ${!isSelf ? `<div style="display:flex;gap:6px;flex-wrap:nowrap">` + (u.plan === 'vip' && u.expires_at ? `<button class="btn-outline" style="padding:4px 10px;font-size:12px;white-space:nowrap" onclick="renewPlan(${u.id})">续卡</button>` : '') + `</div>` : '-'}
      </td>
    </tr>`;
  }).join('');

  // Bind role change
  document.querySelectorAll('.role-select').forEach(sel => {
    sel.addEventListener('change', function() {
      const userId = this.dataset.userId;
      const newRole = this.value;
      if (!confirm(`确定将用户 #${userId} 的角色改为「${newRole === 'admin' ? '管理员' : '普通用户'}」？`)) {
        this.value = this.dataset.originalRole;
        return;
      }
      updateField(userId, 'role', newRole, this, 'originalRole');
    });
  });

  // Bind plan change
  document.querySelectorAll('.plan-select').forEach(function(sel) {
    sel.addEventListener('change', function() {
      var userId = this.dataset.userId;
      var newPlan = this.value;
      var labels = { 'free': '免费版', 'yearly': '年卡', 'lifetime': '终身会员' };
      if (!confirm('确定将用户 #' + userId + ' 的套餐改为「' + (labels[newPlan] || newPlan) + '」？')) {
        this.value = this.dataset.originalPlan;
        return;
      }
      updateField(userId, 'plan', newPlan, this, 'originalPlan');
    });
  });
}

async function updateField(userId, field, value, selectEl, originalAttr) {
  try {
    const res = await fetch(`${API_BASE}/users/${userId}/${field}`, {
      method: 'PATCH',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ [field]: value })
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.error || '更新失败');

    selectEl.dataset[originalAttr] = value;
    showToast(`✅ 用户 #${userId} ${field === 'role' ? '角色' : '套餐'}已更新`);
    loadUsers();
  } catch (err) {
    selectEl.value = selectEl.dataset[originalAttr];
    showToast('❌ ' + err.message, 'error');
  }
}

async function loadUsers() {
  document.getElementById('loadingState').style.display = 'block';
  document.getElementById('tableContent').style.display = 'none';
  document.getElementById('errorState').style.display = 'none';
  document.getElementById('emptyState').style.display = 'none';

  try {
    let url = `${API_BASE}/users?page=${currentPage}&limit=${PAGE_SIZE}`;
    if (currentSearch) url += '&search=' + encodeURIComponent(currentSearch);

    const res = await fetch(url, { credentials: 'include' });
    if (res.status === 403) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('noAuthState').style.display = 'block';
      document.getElementById('pageHeader').style.display = 'none';
      document.getElementById('statsBar').style.display = 'none';
      return;
    }
    if (!res.ok) throw new Error('请求失败: ' + res.status);

    const json = await res.json();
    if (!json.success) throw new Error(json.error || '未知错误');

    const { users, total, page, limit } = json.data;
    currentPage = page;

    // Fetch usage for all visible users
    try {
      const usageRes = await fetch(`${API_BASE}/usage?all=true`, { credentials: 'include' });
      if (usageRes.ok) {
        const usageJson = await usageRes.json();
        if (usageJson.success) {
          // Group usage by user_id (for all=true admin endpoint, or just show all)
          // For now just show current user's usage since we don't have per-user usage endpoint
        }
      }
    } catch(e) {}

    // Also fetch usage per user in the list
    const usagePromises = users.map(u =>
      fetch(`${API_BASE}/usage/admin?user_id=${u.id}`, { credentials: 'include' })
        .then(r => r.ok ? r.json() : null)
        .catch(() => null)
    );
    const usageResults = await Promise.all(usagePromises);
    allUsageMap = {};
    usageResults.forEach((r, i) => {
      if (r && r.success) {
        allUsageMap[users[i].id] = r.data.usage;
      }
    });

    // Stats
    const vipUsers = users.filter(u => u.plan === 'vip').length;
    const adminUsers = users.filter(u => u.role === 'admin').length;
    document.getElementById('totalUsers').textContent = total;
    document.getElementById('vipCount').textContent = vipUsers;
    document.getElementById('adminCount').textContent = adminUsers;
    document.getElementById('regularCount').textContent = total - vipUsers;

    // Pagination
    const totalPages = Math.ceil(total / limit);
    document.getElementById('pageInfo').textContent = `第 ${page} 页 / 共 ${totalPages} 页（${total} 人）`;
    document.getElementById('prevPage').disabled = page <= 1;
    document.getElementById('nextPage').disabled = page >= totalPages;
    document.getElementById('prevPage').onclick = () => { currentPage--; loadUsers(); };
    document.getElementById('nextPage').onclick = () => { currentPage++; loadUsers(); };

    renderUsers(users);

  } catch (err) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('errorMsg').textContent = err.message;
    document.getElementById('errorState').style.display = 'block';
  }
}

async function init() {
  try {
    const meRes = await fetch(`${API_BASE}/auth/me`, { credentials: 'include' });
    if (!meRes.ok) throw new Error('未登录');
    const meJson = await meRes.json();
    if (!meJson.success) throw new Error('未登录');

    currentUser = meJson.data;
    const planLabel = currentUser.plan === 'vip' ? 'VIP' : '免费';
    document.getElementById('userInfo').innerHTML =
      `<strong>${escHtml(currentUser.nickname || currentUser.username)}</strong> · ${currentUser.email} · ` +
      `<span class="role-badge ${currentUser.role === 'admin' ? 'admin' : 'user'}">${currentUser.role === 'admin' ? '管理员' : '普通用户'}</span>` +
      ` · <span class="plan-badge ${currentUser.plan === 'vip' ? 'vip' : 'free'}">${planLabel}</span>`;

    if (currentUser.role !== 'admin') {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('noAuthState').style.display = 'block';
      return;
    }

    loadUsers();
    loadSettings();
    loadStats();

  } catch (e) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('noAuthState').style.display = 'block';
  }

  document.getElementById('searchBtn').addEventListener('click', () => {
    currentSearch = document.getElementById('searchInput').value.trim();
    currentPage = 1;
    document.getElementById('clearSearchBtn').style.display = currentSearch ? 'inline-block' : 'none';
    loadUsers();
  });
  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('searchBtn').click();
  });
  document.getElementById('clearSearchBtn').addEventListener('click', () => {
    document.getElementById('searchInput').value = '';
    currentSearch = '';
    currentPage = 1;
    document.getElementById('clearSearchBtn').style.display = 'none';
    loadUsers();
  });
}


async function renewPlan(userId) {
  if (!confirm(`确定为用户 #${userId} 续卡一年？`)) return;
  try {
    const res = await fetch(`/api/users/${userId}/renew`, {
      method: 'POST',
      credentials: 'include'
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.error || '续卡失败');
    showToast(`✅ 用户 #${userId} 续卡成功`);
    loadUsers();
  } catch (err) {
    showToast('❌ ' + err.message, 'error');
  }
}


async function loadSettings() {
  try {
    const res = await fetch('/api/settings', { credentials: 'include' });
    if (!res.ok) return;
    const json = await res.json();
    if (!json.success) return;
    const d = json.data;
    document.getElementById('limitTarot').value = d.tarot || 0;
    document.getElementById('limitMaya').value = d.maya || 0;
    document.getElementById('limitPsychTest').value = d.psych_test || 0;
    document.getElementById('limitReading').value = d.reading || 0;
  } catch(e) {}
}

document.getElementById('saveLimitsBtn').addEventListener('click', async () => {
  const limits = {
    tarot: parseInt(document.getElementById('limitTarot').value) || 0,
    maya: parseInt(document.getElementById('limitMaya').value) || 0,
    psych_test: parseInt(document.getElementById('limitPsychTest').value) || 0,
    reading: parseInt(document.getElementById('limitReading').value) || 0
  };
  try {
    const res = await fetch('/api/settings', {
      method: 'PUT',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ limits })
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.error || '保存失败');
    showToast('✅ 免费次数已保存');
    loadUsers();
  } catch (err) {
    showToast('❌ ' + err.message, 'error');
  }
});


async function loadStats() {
  try {
    const res = await fetch('/api/usage/stats', { credentials: 'include' });
    if (!res.ok) return;
    const json = await res.json();
    if (!json.success) return;
    const d = json.data;
    const idMap = { tarot: 'statTarot', maya: 'statMaya', psych_test: 'statPsychTest', reading: 'statReading' };
    d.stats.forEach(s => {
      const el = document.getElementById(idMap[s.service]);
      if (el) el.textContent = s.total;
    });
    document.getElementById('statActiveUsers').textContent = d.activeUsers;
  } catch(e) {}
}

document.addEventListener('DOMContentLoaded', init);
</script>
